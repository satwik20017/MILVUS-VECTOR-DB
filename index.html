<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Live CCTV Bounding Box</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #111;
      font-family: sans-serif;
    }

    .video-container {
      position: relative;
      width: 720px;
      height: 560px;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
      transform: scaleX(-1);
    }

    video {
      border-radius: 8px;
      border: 2px solid #333;
      transform: scaleX(-1);
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
</head>

<body>
  <div class="video-container">
    <video id="webcam" width="720" height="560" autoplay muted></video>
    <canvas id="overlay"></canvas>
  </div>

  <script>
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('overlay');

    // Trackers for stable UI values
    const ageAverages = {};
    const expressionTracker = {};

    function startVideo() {
      console.log("Requesting camera access...");
      navigator.mediaDevices.getUserMedia({ video: {} })
        .then(stream => {
          video.srcObject = stream;
          console.log("Camera successfully connected!");
          loadModels();
        })
        .catch(err => {
          console.error("Camera Error:", err);
          alert("Cannot access the webcam. Check if another app is using it or if permissions are blocked.");
        });
    }

    async function loadModels() {
      console.log("Downloading AI models from GitHub...");
      const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
      try {
        await Promise.all([
          faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
          faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
          faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL),
          faceapi.nets.ageGenderNet.loadFromUri(MODEL_URL),
          faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL) // <--- ADD THIS LINE
        ]);
        console.log("AI Models Loaded! Recognition starting...");
        startRecognitionLoop();
      } catch (err) {
        console.error("Failed to load AI models:", err);
      }
    }

    function startRecognitionLoop() {
      video.addEventListener('play', () => {
        const displaySize = { width: video.width, height: video.height };
        faceapi.matchDimensions(canvas, displaySize);

        setInterval(async () => {
          try {
            const detectionOptions = new faceapi.SsdMobilenetv1Options({ minConfidence: 0.60 });
            const detections = await faceapi.detectAllFaces(video, detectionOptions)
              .withFaceLandmarks()
              .withAgeAndGender()
              .withFaceExpressions() // Added mood tracking
              .withFaceDescriptors();

            const resizedDetections = faceapi.resizeResults(detections, displaySize);
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (const det of resizedDetections) {
              const res = await fetch('http://localhost:3000/api/recognize', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ liveVector: Array.from(det.descriptor) })
              });
              const result = await res.json(); // Now 'result' is defined!

              // 2. NOW USE 'result' FOR DRAWING
              const box = det.detection.box;
              const mood = Object.keys(det.expressions).reduce((a, b) => det.expressions[a] > det.expressions[b] ? a : b);
              const topText = result.recognized ? `${result.name} (${Math.round(det.age)}y)` : "Unknown";

              ctx.strokeStyle = result.recognized ? '#00ff00' : '#ff0000';
              ctx.lineWidth = 3;
              ctx.strokeRect(box.x, box.y, box.width, box.height);

              // 2. DRAW BLACK BACKGROUND PANEL
              ctx.fillStyle = 'black';
              ctx.fillRect(box.x, box.y - 60, box.width, 55);

              // 3. DRAW TEXT WITH COUNTER-FLIP LOGIC
              ctx.save(); // Save state before flipping
              ctx.scale(-1, 1); // Flip horizontally for text
              ctx.translate(-canvas.width, 0); // Shift back into view

              // Flipped X coordinate for the text
              const flipX = canvas.width - box.x - box.width;

              ctx.fillStyle = ctx.strokeStyle;
              ctx.font = '18px Arial bold';
              ctx.fillText(topText, flipX + 5, box.y - 40);

              ctx.fillStyle = '#ffffff';
              ctx.font = '16px Arial italic';
              ctx.fillText(`Mood: ${mood.toUpperCase()}`, flipX + 5, box.y - 15);

              ctx.restore(); // Restore to normal state
            }
          } catch (apiErr) {
            console.error("Loop Error:", apiErr);
          }
        }, 500);
      });
      if (!video.paused) { video.dispatchEvent(new Event('play')); }
    }

    window.addEventListener('load', startVideo);
  </script>
</body>

</html>
