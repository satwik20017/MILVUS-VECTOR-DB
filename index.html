<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Live CCTV Bounding Box</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #111;
      font-family: sans-serif;
    }

    .video-container {
      position: relative;
      width: 720px;
      height: 560px;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
    }

    video {
      border-radius: 8px;
      border: 2px solid #333;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
</head>

<body>
  <div class="video-container">
    <video id="webcam" width="720" height="560" autoplay muted></video>
    <canvas id="overlay"></canvas>
  </div>

  <script>
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('overlay');

    // Trackers for stable UI values
    const ageAverages = {};
    const expressionTracker = {};

    function startVideo() {
      console.log("Requesting camera access...");
      navigator.mediaDevices.getUserMedia({ video: {} })
        .then(stream => {
          video.srcObject = stream;
          console.log("Camera successfully connected!");
          loadModels();
        })
        .catch(err => {
          console.error("Camera Error:", err);
          alert("Cannot access the webcam. Check if another app is using it or if permissions are blocked.");
        });
    }

    async function loadModels() {
      console.log("Downloading AI models from GitHub...");
      const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
      try {
        await Promise.all([
          faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
          faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
          faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL),
          faceapi.nets.ageGenderNet.loadFromUri(MODEL_URL),
          faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL) // <--- ADD THIS LINE
        ]);
        console.log("AI Models Loaded! Recognition starting...");
        startRecognitionLoop();
      } catch (err) {
        console.error("Failed to load AI models:", err);
      }
    }

    function startRecognitionLoop() {
      video.addEventListener('play', () => {
        const displaySize = { width: video.width, height: video.height };
        faceapi.matchDimensions(canvas, displaySize);

        setInterval(async () => {
          try {
            const detectionOptions = new faceapi.SsdMobilenetv1Options({ minConfidence: 0.60 });
            const detections = await faceapi.detectAllFaces(video, detectionOptions)
              .withFaceLandmarks()
              .withAgeAndGender()
              .withFaceExpressions() // Added mood tracking
              .withFaceDescriptors();

            const resizedDetections = faceapi.resizeResults(detections, displaySize);
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (const detection of resizedDetections) {
              const vector = Array.from(detection.descriptor);
              const rawAge = Math.round(detection.age);
              
              // Identity check
              const response = await fetch('http://localhost:3000/api/recognize', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ liveVector: vector })
              });
              const result = await response.json();
              const nameKey = result.name || "Unknown";

              // Smoothing: Age
              if (!ageAverages[nameKey]) ageAverages[nameKey] = [];
              ageAverages[nameKey].push(rawAge);
              if (ageAverages[nameKey].length > 10) ageAverages[nameKey].shift();
              const stableAge = Math.round(ageAverages[nameKey].reduce((a, b) => a + b, 0) / ageAverages[nameKey].length);

              // Smoothing: Mood
              const mood = Object.keys(detection.expressions).reduce((a, b) => detection.expressions[a] > detection.expressions[b] ? a : b);
              if (!expressionTracker[nameKey]) expressionTracker[nameKey] = [];
              expressionTracker[nameKey].push(mood);
              if (expressionTracker[nameKey].length > 10) expressionTracker[nameKey].shift();
              const stableMood = expressionTracker[nameKey].sort((a,b) =>
                  expressionTracker[nameKey].filter(v => v===a).length - expressionTracker[nameKey].filter(v => v===b).length
              ).pop();

              const genderLabel = (detection.gender === 'male') ? 'M' : 'F';
              const box = detection.detection.box;
              const boxColor = result.recognized ? '#00ff00' : '#ff0000';

              // Drawing
              ctx.strokeStyle = boxColor;
              ctx.lineWidth = 3;
              ctx.strokeRect(box.x, box.y, box.width, box.height);

              // Background Panel (Larger to fit two lines)
              ctx.fillStyle = 'black';
              ctx.fillRect(box.x, box.y - 60, box.width, 55);

              // Top Line: Identity/Age/Gender
              ctx.fillStyle = boxColor;
              ctx.font = '18px Arial bold';
              const topText = result.recognized ? `${result.name} (${stableAge}y, ${genderLabel})` : `${stableAge}y, ${genderLabel}`;
              ctx.fillText(topText, box.x + 5, box.y - 40);

              // Bottom Line: Mood
              ctx.fillStyle = '#ffffff';
              ctx.font = '16px Arial italic';
              ctx.fillText(`Mood: ${stableMood.toUpperCase()}`, box.x + 5, box.y - 15);
            }
          } catch (apiErr) {
            console.error("Loop Error:", apiErr);
          }
        }, 500);
      });
      if (!video.paused) { video.dispatchEvent(new Event('play')); }
    }

    window.addEventListener('load', startVideo);
  </script>
</body>
</html>
